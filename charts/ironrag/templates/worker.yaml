apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ironrag.fullname" . }}-worker
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "ironrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "ironrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ironrag.serviceAccountName" . }}
      {{- if eq .Values.startup.mode "startup_job" }}
      initContainers:
        {{- include "ironrag.startupWaitInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ include "ironrag.appImage" (dict "root" . "image" .Values.worker.image) }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.security.runAsUser | default 1000 }}
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "ironrag.fullname" . }}-runtime
            - secretRef:
                name: {{ include "ironrag.runtimeSecretName" . }}
          env:
            - name: IRONRAG_SERVICE_ROLE
              value: worker
            - name: IRONRAG_SERVICE_NAME
              value: ironrag-worker
            - name: OTEL_SERVICE_NAME
              value: ironrag-worker
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.storage.provider "filesystem" }}
            - name: content-storage
              mountPath: {{ .Values.storage.rootPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if eq .Values.storage.provider "filesystem" }}
        - name: content-storage
          persistentVolumeClaim:
            claimName: {{ include "ironrag.fullname" . }}-content-storage
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ironrag.fullname" . }}-worker
  labels:
    {{- include "ironrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: {{ .Values.worker.service.type }}
  selector:
    {{- include "ironrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  ports:
    - name: http
      port: {{ .Values.worker.service.port }}
      targetPort: http
