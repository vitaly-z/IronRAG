  /v1/webhooks/subscriptions/{id}/attempts:
    get:
      tags:
      - webhooks
      operationId: listWebhookDeliveryAttempts
      parameters:
      - name: id
        in: path
        description: Webhook subscription identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: state
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Delivery attempts for the outbound webhook subscription
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryAttemptResponse'
        '401':
          description: Caller is not authenticated
