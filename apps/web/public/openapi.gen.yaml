openapi: 3.1.0
info:
  title: IronRAG API
  description: Public HTTP API for the ArangoDB-backed IronRAG service (`apps/api/src/interfaces/http`). Operation paths include the `/v1` prefix. `servers.url` is the API origin without the `/v1` suffix.
  license:
    name: MIT
    identifier: MIT
  version: 0.4.1
servers:
- url: /
  description: Same origin (paths include /v1)
paths:
  /v1/admin/surface:
    get:
      tags:
      - admin
      operationId: getAdminSurface
      responses:
        '200':
          description: Admin surface for the authenticated principal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSurface'
        '401':
          description: Caller is not authenticated
  /v1/ai/bindings:
    get:
      tags:
      - ai
      operationId: listAiLibraryBindings
      parameters:
      - name: scopeKind
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/AiScopeKind'
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Binding assignments for the requested scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiBindingAssignmentResponse'
        '400':
          description: scopeKind query parameter is required
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the requested scope
    post:
      tags:
      - ai
      operationId: createAiLibraryBinding
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBindingAssignmentRequest'
        required: true
      responses:
        '200':
          description: Newly created binding assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBindingAssignmentResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer bindings in the requested scope
  /v1/ai/bindings/{bindingId}:
    put:
      tags:
      - ai
      operationId: updateAiLibraryBinding
      parameters:
      - name: bindingId
        in: path
        description: Binding assignment identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBindingAssignmentRequest'
        required: true
      responses:
        '200':
          description: Updated binding assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBindingAssignmentResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer bindings in the binding's scope
        '404':
          description: Binding not found
    delete:
      tags:
      - ai
      operationId: deleteAiLibraryBinding
      parameters:
      - name: bindingId
        in: path
        description: Binding assignment identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Empty acknowledgement payload
          content:
            application/json:
              schema: {}
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer bindings in the binding's scope
        '404':
          description: Binding not found
  /v1/ai/bindings/{bindingId}/validate:
    post:
      tags:
      - ai
      operationId: validateAiLibraryBinding
      parameters:
      - name: bindingId
        in: path
        description: Binding assignment identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Binding validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingValidationResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot validate bindings in the binding's scope
        '404':
          description: Binding not found
  /v1/ai/credentials:
    get:
      tags:
      - ai
      operationId: listAiCredentials
      parameters:
      - name: scopeKind
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/AiScopeKind'
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Visible provider credentials for the requested scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderCredentialResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the requested scope
    post:
      tags:
      - ai
      operationId: createAiCredential
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProviderCredentialRequest'
        required: true
      responses:
        '200':
          description: Newly created provider credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCredentialResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer credentials in the requested scope
  /v1/ai/credentials/{credentialId}:
    put:
      tags:
      - ai
      operationId: updateAiCredential
      parameters:
      - name: credentialId
        in: path
        description: Provider credential identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProviderCredentialRequest'
        required: true
      responses:
        '200':
          description: Updated provider credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCredentialResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer credentials in the credential's scope
        '404':
          description: Credential not found
  /v1/ai/model-presets:
    get:
      tags:
      - ai
      operationId: listAiModelPresets
      parameters:
      - name: scopeKind
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/AiScopeKind'
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Visible model presets for the requested scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelPresetResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the requested scope
    post:
      tags:
      - ai
      operationId: createAiModelPreset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelPresetRequest'
        required: true
      responses:
        '200':
          description: Newly created model preset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelPresetResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer presets in the requested scope
  /v1/ai/model-presets/{presetId}:
    put:
      tags:
      - ai
      operationId: updateAiModelPreset
      parameters:
      - name: presetId
        in: path
        description: Model preset identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelPresetRequest'
        required: true
      responses:
        '200':
          description: Updated model preset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelPresetResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer presets in the preset's scope
        '404':
          description: Preset not found
  /v1/ai/models:
    get:
      tags:
      - ai
      operationId: listAiModels
      parameters:
      - name: providerCatalogId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: credentialId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Resolved AI models for the requested context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot view the requested workspace/library
  /v1/ai/prices:
    get:
      tags:
      - ai
      operationId: listAiPrices
      parameters:
      - name: modelCatalogId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Price catalog entries for the requested model/workspace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriceCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
    post:
      tags:
      - ai
      operationId: createAiPriceOverride
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspacePriceOverrideRequest'
        required: true
      responses:
        '200':
          description: Newly created workspace price override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer pricing for the workspace
  /v1/ai/prices/{priceId}:
    put:
      tags:
      - ai
      operationId: updateAiPriceOverride
      parameters:
      - name: priceId
        in: path
        description: Price catalog entry identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspacePriceOverrideRequest'
        required: true
      responses:
        '200':
          description: Updated workspace price override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot administer pricing for the workspace
        '404':
          description: Price override not found
  /v1/ai/providers:
    get:
      tags:
      - ai
      operationId: listAiProviders
      responses:
        '200':
          description: Available AI providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderCatalogEntryResponse'
        '401':
          description: Caller is not authenticated
  /v1/audit/events:
    get:
      tags:
      - audit
      operationId: listAuditEvents
      parameters:
      - name: actorPrincipalId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: workspaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: knowledgeDocumentId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: knowledgeRevisionId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: contextBundleId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: querySessionId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: queryExecutionId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: runtimeExecutionId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: asyncOperationId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: surfaceKind
        in: query
        required: false
        schema:
          type: string
      - name: resultKind
        in: query
        required: false
        schema:
          type: string
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: internal
        in: query
        required: false
        schema:
          type: boolean
      - name: includeAssistant
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Audit events page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventPageResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the requested scope
  /v1/billing/executions/{executionKind}/{executionId}:
    get:
      tags:
      - billing
      operationId: getBillingExecutionCost
      parameters:
      - name: executionKind
        in: path
        description: Execution kind (query | runtime)
        required: true
        schema:
          type: string
      - name: executionId
        in: path
        description: Execution identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Total billing cost for the execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingExecutionCost'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the execution's library
  /v1/billing/executions/{executionKind}/{executionId}/charges:
    get:
      tags:
      - billing
      operationId: listBillingCharges
      parameters:
      - name: executionKind
        in: path
        description: Execution kind (query | runtime)
        required: true
        schema:
          type: string
      - name: executionId
        in: path
        description: Execution identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Aggregated billing charges for the execution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BillingCharge'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the execution's library
  /v1/billing/executions/{executionKind}/{executionId}/provider-calls:
    get:
      tags:
      - billing
      operationId: listBillingProviderCalls
      parameters:
      - name: executionKind
        in: path
        description: Execution kind (query | runtime)
        required: true
        schema:
          type: string
      - name: executionId
        in: path
        description: Execution identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Provider calls billed against the execution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BillingProviderCall'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the execution's library
  /v1/billing/library-cost-summary:
    get:
      tags:
      - billing
      operationId: getLibraryCostSummary
      parameters:
      - name: libraryId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Aggregated cost summary for the library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryCostSummary'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the library
  /v1/billing/library-document-costs:
    get:
      tags:
      - billing
      operationId: listBillingLibraryDocumentCosts
      parameters:
      - name: libraryId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Per-document cost summaries for the library
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentCostSummary'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the library
  /v1/billing/workspace-cost-summary:
    get:
      tags:
      - billing
      operationId: getWorkspaceCostSummary
      parameters:
      - name: workspaceId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Aggregated cost summary for the workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCostSummary'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the workspace
  /v1/catalog/libraries/{libraryId}:
    get:
      tags:
      - catalog
      operationId: getCatalogLibrary
      parameters:
      - name: libraryId
        in: path
        description: Library identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Library detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogLibraryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller cannot discover the library
        '404':
          description: Library not found
    put:
      tags:
      - catalog
      operationId: updateCatalogLibrary
      parameters:
      - name: libraryId
        in: path
        description: Library identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCatalogLibraryRequest'
        required: true
      responses:
        '200':
          description: Library after applying the update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogLibraryResponse'
        '400':
          description: Invalid lifecycle state
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a workspace admin
        '404':
          description: Library not found
  /v1/catalog/libraries/{libraryId}/recognition-policy:
    put:
      tags:
      - catalog
      operationId: updateCatalogLibraryRecognitionPolicy
      parameters:
      - name: libraryId
        in: path
        description: Library identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLibraryRecognitionPolicyRequest'
        required: true
      responses:
        '200':
          description: Library after applying the new recognition policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogLibraryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller does not have library write permission
        '404':
          description: Library not found
  /v1/catalog/libraries/{libraryId}/web-ingest-policy:
    put:
      tags:
      - catalog
      operationId: updateCatalogLibraryWebIngestPolicy
      parameters:
      - name: libraryId
        in: path
        description: Library identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLibraryWebIngestPolicyRequest'
        required: true
      responses:
        '200':
          description: Library after applying the new web ingest policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogLibraryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller does not have library write permission
        '404':
          description: Library not found
  /v1/catalog/workspaces:
    get:
      tags:
      - catalog
      operationId: listCatalogWorkspaces
      responses:
        '200':
          description: Workspaces visible to the caller
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogWorkspaceResponse'
        '401':
          description: Caller is not authenticated
    post:
      tags:
      - catalog
      operationId: createCatalogWorkspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCatalogWorkspaceRequest'
        required: true
      responses:
        '200':
          description: Newly created workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogWorkspaceResponse'
        '401':
          description: Caller is not a system administrator
  /v1/catalog/workspaces/{workspaceId}:
    get:
      tags:
      - catalog
      operationId: getCatalogWorkspace
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogWorkspaceResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the workspace
        '404':
          description: Workspace not found
    delete:
      tags:
      - catalog
      operationId: deleteCatalogWorkspace
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Workspace deleted
        '401':
          description: Caller is not a system administrator
        '404':
          description: Workspace not found
  /v1/catalog/workspaces/{workspaceId}/libraries:
    get:
      tags:
      - catalog
      operationId: listCatalogLibraries
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Libraries visible to the caller in this workspace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogLibraryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the workspace
    post:
      tags:
      - catalog
      operationId: createCatalogLibrary
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCatalogLibraryRequest'
        required: true
      responses:
        '200':
          description: Newly created library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogLibraryResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a workspace admin
  /v1/catalog/workspaces/{workspaceId}/libraries/{libraryId}:
    delete:
      tags:
      - catalog
      operationId: deleteCatalogLibrary
      parameters:
      - name: workspaceId
        in: path
        description: Workspace identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: libraryId
        in: path
        description: Library identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Library deleted
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not a workspace admin
        '404':
          description: Library not found
  /v1/chunks:
    get:
      tags:
      - content
      operationId: listChunks
      parameters:
      - name: documentId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Chunks for the requested revision
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChunkSummary'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the document
  /v1/content/documents:
    get:
      tags:
      - content
      summary: Canonical slim paginated document list.
      description: |-
        Response shape is `DocumentListPageResponse { items, next_cursor, total_count }`.
        Each `items[i]` is a `ContentDocumentListItem` with only the fields the
        documents page actually renders — status/readiness are derived server-side.
        The inspector panel fetches full detail via `/content/documents/{id}`.
      operationId: listContentDocuments
      parameters:
      - name: libraryId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: includeDeleted
        in: query
        required: false
        schema:
          type: boolean
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: sortBy
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/DocumentListSortKey'
      - name: sortOrder
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/DocumentListSortOrder'
      - name: includeTotal
        in: query
        required: false
        schema:
          type: boolean
      - name: status
        in: query
        description: |-
          Comma-separated list of status buckets to keep. Accepted values:
          `canceled`, `failed`, `processing`, `queued`, `ready`. Empty or
          absent = no filter. Matches the canonical `derived_status` column
          in the list CTE and the 5 status pills on the documents page.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Document list page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListPageResponse'
        '401':
          description: Caller is not authenticated
        '403':
          description: Caller is not authorized for the library
